<div class="page" style="min-height:100vh;display:grid;place-items:center;background:var(--bg)">
  <main class="shell" role="main">
    <section class="panel left">
      <div class="brand" aria-label="Parque Acuario Puyehue">
        <img class="brand-logo" src="/icons/logo_acuario_titulo.png" alt="Parque Acuario" />
      </div>
    </section>

    <div class="divider" aria-hidden="true"></div>

    <section class="panel right">
      <form class="card" #f="ngForm" (ngSubmit)="onSubmit(f)">
        <h1 class="welcome">Bienvenido</h1>
        <p class="hint">Por favor inicia sesión para acceder al panel de administración.</p>

        <!-- Mensaje de error -->
        <div *ngIf="errorMessage" style="background:#fee;border:1px solid #c33;padding:12px;border-radius:8px;color:#c33;margin-bottom:16px;font-size:14px;">
          {{ errorMessage }}
        </div>

        <label for="email">Usuario</label>
        <input id="email" name="email" type="text" placeholder="admin" required ngModel />

        <label for="password">Contraseña</label>
        <input id="password" name="password" type="password" placeholder="••••••••" required ngModel />

        <div class="actions">
          <a class="link" href="#">¿Olvidaste tu contraseña?  Contacta al administrador </a>
          <button class="btn" type="submit" [disabled]="loading">
            {{ loading ? 'Cargando...' : 'Entrar' }}
          </button>
        </div>
      </form>
    </section>
  </main>
</div>
