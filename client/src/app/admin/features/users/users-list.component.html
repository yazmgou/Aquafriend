<div class="users-container">
  <div class="header">
    <h1>Gestión de Usuarios</h1>
    <div class="header-buttons">
      <button class="btn-primary" (click)="nuevoUsuario()" [disabled]="cargando" title="Crear usuario">
        <i class="bi bi-plus-lg"></i>
        <span>Nuevo Usuario</span>
      </button>
    </div>
  </div>

  <div class="loading" *ngIf="cargando">
    <p>Cargando usuarios...</p>
  </div>

  <div class="usuarios-table" *ngIf="!cargando">
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Nombre Completo</th>
          <th>Email</th>
          <th>Rol</th>
          <th class="th-actions">Acciones</th>
        </tr>
      </thead>

      <tbody *ngIf="usuariosFiltrados.length > 0; else sinDatos">
        <tr *ngFor="let usuario of usuariosFiltrados">
          <td>{{ usuario.id_usuario }}</td>
          <td>{{ usuario.nombre }} {{ usuario.apellido }}</td>
          <td>{{ usuario.email }}</td>
          <td><span class="badge badge-role">{{ usuario.role }}</span></td>
          <td class="actions">
            <label class="toggle" [class.is-on]="usuario.activo === 1">
              <input
                type="checkbox"
                [checked]="usuario.activo === 1"
                (change)="changeEstado(usuario, $event.target.checked)"
                aria-label="Cambiar estado de {{usuario.nombre}} {{usuario.apellido}}"
              />
              <span class="track"><span class="thumb"></span></span>
            </label>

            <button class="btn-icon btn-edit" (click)="editarUsuario(usuario)" [disabled]="cargando" title="Editar usuario">
              <i class="bi bi-pencil-square"></i>
            </button>
            <button class="btn-icon btn-delete" (click)="eliminarUsuario(usuario)" [disabled]="cargando" title="Eliminar usuario">
              <i class="bi bi-trash"></i>
            </button>
          </td>
        </tr>
      </tbody>

      <ng-template #sinDatos>
        <tbody>
          <tr class="empty-row">
            <td colspan="5">
              <i class="bi bi-info-circle"></i>
              <span>No hay información disponible.</span>
            </td>
          </tr>
        </tbody>
      </ng-template>
    </table>
  </div>
</div>

<div class="modal-overlay" *ngIf="mostrarModalEditar" (click)="cerrarModalEditar()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h2>Editar Usuario</h2>
      <button class="btn-close" (click)="cerrarModalEditar()" title="Cerrar">
        <i class="bi bi-x-lg"></i>
      </button>
    </div>

    <div class="modal-body" *ngIf="usuarioEditando">
      <div class="form-group">
        <label>Nombre</label>
        <input type="text" [(ngModel)]="usuarioEditando.nombre" class="form-control" />
      </div>

      <div class="form-group">
        <label>Apellido</label>
        <input type="text" [(ngModel)]="usuarioEditando.apellido" class="form-control" />
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" [(ngModel)]="usuarioEditando.email" class="form-control" />
      </div>

      <div class="form-group">
        <label>Estado</label>
        <select [(ngModel)]="usuarioEditando.activo" class="form-control">
          <option [value]="1">Activo</option>
          <option [value]="0">Inactivo</option>
        </select>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn-secondary" (click)="cerrarModalEditar()" [disabled]="cargando">Cancelar</button>
      <button class="btn-primary" (click)="guardarEdicion()" [disabled]="cargando">
        {{ cargando ? 'Guardando...' : 'Guardar Cambios' }}
      </button>
    </div>
  </div>
</div>
