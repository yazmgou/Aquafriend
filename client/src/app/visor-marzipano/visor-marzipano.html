<header class="tour-toolbar">
  <div class="tour-toolbar__main">
    <a routerLink="/view360" class="back-button">
      <span aria-hidden="true">←</span>
      <span>Volver a la selección</span>
    </a>
    <div class="tour-toolbar__info">
      <p class="eyebrow">{{ currentTour?.category || 'Recorrido 360°' }}</p>
      <h1>{{ currentTour?.title || 'Exploración virtual' }}</h1>
      <p *ngIf="currentTour?.description">{{ currentTour?.description }}</p>
    </div>
  </div>
  <div class="tour-toolbar__tags" *ngIf="currentTour?.highlights?.length">
    <span *ngFor="let tag of currentTour?.highlights">{{ tag }}</span>
  </div>
</header>

<div id="marzipano-viewer" class="tour-viewer"></div>
